AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  PrivateRouteTables:
    Type: String

  PublicSubnet:
    Type: String

  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64'

Resources:
  NATInstanceAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
      - !Ref PublicSubnet
      MixedInstancesPolicy:
        InstancesDistribution:
          OnDemandPercentageAboveBaseCapacity: 0
          SpotAllocationStrategy: lowest-price
        LaunchTemplate:
          LaunchTemplateSpecification:
            LaunchTemplateId: !Ref NATInstanceLaunchTemplate
            Version: !GetAtt NATInstanceLaunchTemplate.LatestVersionNumber
          Overrides:
          - InstanceType: t3a.nano
          - InstanceType: t3.nano
      MaxSize: '1'
      MinSize: '1'
      MetricsCollection:
      - Granularity: 1Minute
        Metrics:
        - GroupInServiceInstances
      Tags:
      - Key: Name
        PropagateAtLaunch: true
        Value: !Join ['', [!Ref 'AWS::AccountId', '-', !Ref 'AWS::Region', '-', !Ref 'AWS::StackName']]

  NATInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service:
            - ec2.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
      - PolicyName: ec2
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - 'ec2:ModifyInstanceAttribute'
            - 'ec2:CreateRoute'
            - 'ec2:ReplaceRoute'
            - "ec2:AttachNetworkInterface"
            Resource:
            - '*'

  NATStaticNetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref PublicSubnet
      SourceDestCheck: False

  NATEIP:
    Type: AWS::EC2::EIP

  NATEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      NetworkInterfaceId: !Ref NATStaticNetworkInterface
      AllocationId: !GetAtt NATEIP.AllocationId

  NATInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Join ['', [!Ref 'AWS::AccountId', '-', !Ref 'AWS::Region', '-', !Ref 'AWS::StackName']]
      Roles:
      - !Ref NATInstanceRole

  NATInstanceLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Join ['', [!Ref 'AWS::AccountId', '-', !Ref 'AWS::Region', '-', !Ref 'AWS::StackName']]
      LaunchTemplateData:
        IamInstanceProfile:
          Arn: !GetAtt NATInstanceProfile.Arn
        ImageId: !Ref LatestAmiId
        InstanceType: t3.nano
        UserData:
          'Fn::Base64': !Sub
          - |
            #!/bin/bash -ex

            # AL2023 enforces IMDSv2, so fetch a session token before querying.
            TOKEN=$(curl -s -m 60 -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            INSTANCEID=$(curl -s -m 60 -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id)

            # Capture the primary interface before attaching the NAT ENI.
            # AL2023 uses predictable names (e.g. ens5) rather than eth0/eth1.
            PRIMARY_IF=$(ip route show default | awk '{print $5; exit}')

            aws --region ${Region} ec2 modify-instance-attribute \
              --instance-id $INSTANCEID \
              --source-dest-check "{\"Value\": false}"

            aws --region ${Region} ec2 attach-network-interface \
                --device-index 1 \
                --instance-id $INSTANCEID \
                --network-interface-id ${NATStaticNetworkInterface}

            # Wait for the second ENI to appear and identify it by exclusion.
            NAT_IF=""
            while [ -z "$NAT_IF" ]; do
              NAT_IF=$(ls /sys/class/net | grep -vxe lo -e "$PRIMARY_IF" | head -n1)
              sleep 1
            done
            ip link set dev "$NAT_IF" up

            # Enable accepting incoming network packets.
            sysctl -q -w net.ipv4.ip_forward=1

            # Disables sending IPv4 ICMP redirected packets.
            sysctl -q -w net.ipv4.conf.$NAT_IF.send_redirects=0

            # Enabled Network Address Translation (NAT). AL2023 ships
            # nftables; use iptables if present, otherwise nft directly.
            # Avoids installing packages at boot (dnf OOMs on t3a.nano).
            if command -v iptables >/dev/null; then
              iptables -t nat -A POSTROUTING -o "$NAT_IF" -j MASQUERADE
            else
              nft add table ip nat
              nft add chain ip nat postrouting '{ type nat hook postrouting priority 100 ; }'
              nft add rule ip nat postrouting oifname "$NAT_IF" masquerade
            fi

            # Remove default route to primary interface.
            ip route del default dev "$PRIMARY_IF"

            # Update private subnet route tables to point to eni.
            IFS=$','
            tables=${PrivateRouteTables}
            for table in $tables; do
              aws --region ${Region} ec2 replace-route \
                --route-table-id $table \
                --destination-cidr-block "0.0.0.0/0" \
                --network-interface-id ${NATStaticNetworkInterface} || \
                  aws --region ${Region} ec2 create-route \
                    --route-table-id $table \
                    --destination-cidr-block "0.0.0.0/0" \
                    --network-interface-id ${NATStaticNetworkInterface}
            done
            unset IFS
          - PrivateRouteTables: !Ref PrivateRouteTables
            Region: !Ref "AWS::Region"
            NATStaticNetworkInterface: !Ref NATStaticNetworkInterface
